<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
</head>
<body>
<script>
var params = new URLSearchParams(window.location.search);
var id = params.get('p');

if (!id) {
  document.title = 'Not found';
  document.body.textContent = 'No project specified.';
} else {
  fetch('d/19f697798855/index.json')
    .then(function(r) { return r.json(); })
    .then(function(projects) {
      var project = projects.find(function(p) { return p.id === id; });
      if (!project) {
        document.title = 'Not found';
        document.body.textContent = 'Project not found.';
        return;
      }
      var file = project.file || 'index.html';
      window.location.replace('p/' + project.id + '/' + file);
    })
    .catch(function() {
      document.body.textContent = 'Could not load project.';
    });
}
</script>
</body>
</html>
